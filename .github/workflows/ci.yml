name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install deps
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install ".[dev]"
      - name: Ruff check
        run: .venv/bin/ruff check src/ tests/ scripts/ conftest.py
      - name: Ruff format check
        run: .venv/bin/ruff format --check src/ tests/ scripts/ conftest.py

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install deps
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install ".[dev]"
      - name: Run unit tests
        run: .venv/bin/pytest tests/unit -v