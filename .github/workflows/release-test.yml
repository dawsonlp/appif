name: Release Workflow Smoke Test

# Temporary, manually-dispatched mirror of release.yml used to verify the
# pipeline (build, changelog extraction, and softprops/action-gh-release@v3
# on the Node 24 runtime) WITHOUT publishing to PyPI. The PyPI publish step
# is replaced by a DRAFT GitHub Release (not public, easily deleted).
# Safe to delete once verified.

on:
  workflow_dispatch:
    inputs:
      version:
        description: CHANGELOG version to extract notes for
        default: "1.4.0"
        required: true

jobs:
  test:
    name: Mirror of release.yml (no PyPI)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Extract changelog for this version
        run: |
          python3 << 'PYEOF'
          import re
          version = "${{ inputs.version }}"
          text = open("CHANGELOG.md").read()
          pattern = rf"## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|$)"
          match = re.search(pattern, text, re.DOTALL)
          body = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open("release_notes.md", "w") as f:
              f.write(body)
          print(body[:300])
          PYEOF

      - name: Create DRAFT GitHub Release (replaces PyPI publish in this test)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ghrelease-test-dispatch
          name: "[TEST] release.yml smoke test"
          body_path: release_notes.md
          draft: true
          generate_release_notes: false
