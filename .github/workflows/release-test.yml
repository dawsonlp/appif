name: Release Step Smoke Test

# Temporary workflow to verify that softprops/action-gh-release@v3 runs on
# the Node 24 runtime with the same inputs release.yml uses — WITHOUT
# publishing to PyPI or creating a public release.
#
# Triggers on tags matching `ghrelease-test-*` (NOT `v*`, so the real
# release.yml never fires for these). Produces a DRAFT release, which is
# not public and is easily deleted. Safe to remove once verified.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Throwaway tag name for the draft release
        default: ghrelease-test-manual
        required: true
  push:
    tags:
      - 'ghrelease-test-*'

jobs:
  smoke:
    name: Draft release (isolated, no PyPI)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release notes file
        run: echo "Smoke test of action-gh-release@v3 on the Node 24 runtime." > release_notes.md

      - name: Create DRAFT GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "[TEST] action-gh-release v3 smoke test"
          body_path: release_notes.md
          draft: true
          generate_release_notes: false
