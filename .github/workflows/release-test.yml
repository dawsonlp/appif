name: Release Step Smoke Test

# Temporary, manually-triggered workflow to verify that
# softprops/action-gh-release@v3 runs on the Node 24 runtime with the
# same inputs release.yml uses — WITHOUT publishing to PyPI or creating a
# public release. Produces a DRAFT release (no git tag, easily deleted).
# Safe to delete once the upgrade is verified.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Throwaway tag name for the draft release
        default: v0.0.0-ghrelease-test
        required: true

jobs:
  smoke:
    name: Draft release (isolated, no PyPI)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release notes file
        run: echo "Smoke test of action-gh-release@v3 on the Node 24 runtime." > release_notes.md

      - name: Create DRAFT GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: "[TEST] action-gh-release v3 smoke test"
          body_path: release_notes.md
          draft: true
          generate_release_notes: false
